<svg width="720" height="380" viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c16"/>
      <stop offset="100%" stop-color="#14101f"/>
    </linearGradient>
    <radialGradient id="g-orange" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-blue" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" fill="url(#bg2)"/>
  <rect width="720" height="380" fill="url(#g-orange)"/>
  <rect width="720" height="380" fill="url(#g-blue)"/>

  <!-- Section label left -->
  <text x="160" y="36" font-size="10" font-weight="600" fill="rgba(255,255,255,0.35)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle" letter-spacing="1.5">OFFLINE CACHE</text>
  <rect x="80" y="42" width="160" height="0.5" fill="rgba(255,255,255,0.1)"/>

  <!-- Section label right -->
  <text x="560" y="36" font-size="10" font-weight="600" fill="rgba(255,255,255,0.35)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle" letter-spacing="1.5">ABOUT PANEL</text>
  <rect x="480" y="42" width="160" height="0.5" fill="rgba(255,255,255,0.1)"/>

  <!-- Divider center -->
  <line x1="360" y1="28" x2="360" y2="358" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>

  <!-- ══════════════════════════════════════
       LEFT PANEL: Offline Cache State
  ══════════════════════════════════════ -->
  <rect x="80" y="58" width="248" height="290" rx="12" fill="#1c1c1e" filter="url(#s2)"/>
  <rect x="80" y="58" width="248" height="290" rx="12" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.7"/>

  <!-- Header -->
  <text x="96" y="84" font-size="13" font-weight="700" fill="white" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">MiniMax</text>
  <text x="96" y="99" font-size="10" fill="rgba(255,255,255,0.45)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">Token Plan 用量</text>
  <!-- Offline indicator in menu bar item area -->
  <circle cx="305" cy="78" r="13" fill="rgba(255,255,255,0.07)"/>
  <path d="M299,74 A7,7 0 1,1 301,81" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.4" stroke-linecap="round"/>
  <polygon points="299,71 297,76 303,76" fill="rgba(255,255,255,0.5)"/>

  <!-- Offline banner -->
  <rect x="88" y="108" width="232" height="26" rx="6" fill="rgba(255,149,0,0.12)"/>
  <rect x="88" y="108" width="232" height="26" rx="6" fill="none" stroke="rgba(255,149,0,0.25)" stroke-width="0.6"/>
  <!-- Wifi slash icon circle -->
  <circle cx="101" cy="121" r="4" fill="none" stroke="rgba(255,149,0,0.7)" stroke-width="1.2"/>
  <line x1="97" y1="117" x2="105" y2="125" stroke="rgba(255,149,0,0.7)" stroke-width="1.2"/>
  <text x="110" y="125" font-size="9.5" fill="rgba(255,180,0,0.85)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">数据来自 5 分钟前，当前无法连接</text>

  <!-- Separator -->
  <rect x="80" y="140" width="248" height="0.5" fill="rgba(255,255,255,0.07)"/>

  <!-- TEXT section label -->
  <text x="96" y="160" font-size="9" font-weight="600" fill="rgba(255,255,255,0.28)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" letter-spacing="1.3">TEXT</text>

  <!-- Cached card (with stale overlay tint) -->
  <rect x="88" y="167" width="232" height="90" rx="8" fill="#252528"/>
  <rect x="88" y="167" width="232" height="90" rx="8" fill="rgba(255,149,0,0.03)"/>
  <rect x="88" y="167" width="232" height="90" rx="8" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <rect x="88" y="178" width="3" height="26" rx="1.5" fill="#ffd60a" opacity="0.6"/>

  <text x="100" y="186" font-size="11.5" font-weight="600" fill="rgba(255,255,255,0.75)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">MiniMax-M2.7</text>
  <!-- Tilde indicates stale -->
  <text x="308" y="186" font-size="11.5" font-weight="600" fill="#ffd60a" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">~72%</text>

  <!-- Stale progress bar -->
  <rect x="100" y="196" width="204" height="4" rx="2" fill="#3a3a3c"/>
  <rect x="100" y="196" width="147" height="4" rx="2" fill="rgba(255,215,0,0.6)"/>

  <text x="100" y="215" font-size="9" fill="rgba(255,255,255,0.35)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">剩余 72,000 / 100,000</text>
  <text x="308" y="215" font-size="9" fill="rgba(255,255,255,0.28)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">重置 2h 30m</text>

  <!-- Stale badge -->
  <rect x="100" y="226" width="42" height="14" rx="4" fill="rgba(255,149,0,0.18)"/>
  <text x="121" y="236" font-size="8.5" fill="rgba(255,180,0,0.75)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">缓存数据</text>

  <!-- Menu bar offline indicator callout -->
  <text x="204" y="316" font-size="9" fill="rgba(255,255,255,0.22)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">菜单栏显示 ⚠ 2.7·~72%</text>
  <text x="204" y="330" font-size="9" fill="rgba(255,255,255,0.16)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">波浪线标记数据可能过期</text>

  <!-- ══════════════════════════════════════
       RIGHT PANEL: About Panel
  ══════════════════════════════════════ -->
  <rect x="392" y="58" width="248" height="290" rx="12" fill="#1c1c1e" filter="url(#s2)"/>
  <rect x="392" y="58" width="248" height="290" rx="12" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.7"/>

  <!-- Header with About active -->
  <text x="408" y="84" font-size="13" font-weight="700" fill="white" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">MiniMax</text>
  <!-- Subtitle as button (active/highlighted) -->
  <rect x="408" y="90" width="130" height="16" rx="4" fill="rgba(255,255,255,0.06)"/>
  <text x="415" y="102" font-size="9.5" fill="rgba(255,255,255,0.55)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">Token Plan 用量  ∧</text>

  <!-- Separator -->
  <rect x="392" y="112" width="248" height="0.5" fill="rgba(255,255,255,0.07)"/>

  <!-- About panel content -->
  <!-- App icon + name -->
  <circle cx="414" cy="134" r="12" fill="rgba(255,255,255,0.08)"/>
  <circle cx="414" cy="134" r="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>
  <!-- Mini icon inside -->
  <rect x="408" y="130" width="12" height="8" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="410" y="133" width="4" height="4" rx="1" fill="rgba(30,30,30,0.8)"/>

  <text x="432" y="130" font-size="11.5" font-weight="600" fill="white" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">MiniMax Status Bar</text>
  <text x="432" y="143" font-size="9" fill="rgba(255,255,255,0.38)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">v2.0.0 · macOS 13.0+</text>

  <!-- Tagline -->
  <text x="408" y="164" font-size="9.5" fill="rgba(255,255,255,0.42)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">为重度使用 MiniMax Token Plan 的</text>
  <text x="408" y="178" font-size="9.5" fill="rgba(255,255,255,0.42)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">开发者而生。零配置，零打扰。</text>

  <!-- Divider -->
  <rect x="408" y="189" width="216" height="0.5" fill="rgba(255,255,255,0.07)"/>

  <!-- Link rows -->
  <!-- Row 1: Console -->
  <rect x="408" y="198" width="216" height="26" rx="5" fill="rgba(255,255,255,0.04)"/>
  <rect x="416" y="207" width="7" height="9" rx="1.5" fill="rgba(255,255,255,0.35)"/>
  <text x="430" y="215" font-size="10" fill="rgba(255,255,255,0.65)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">MiniMax Token Plan 控制台</text>
  <text x="619" y="215" font-size="9" fill="rgba(255,255,255,0.25)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">↗</text>

  <!-- Row 2: GitHub -->
  <rect x="408" y="228" width="216" height="26" rx="5" fill="rgba(255,255,255,0.04)"/>
  <!-- Code brackets icon -->
  <text x="412" y="244" font-size="11" fill="rgba(255,255,255,0.35)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">{ }</text>
  <text x="430" y="245" font-size="10" fill="rgba(255,255,255,0.65)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">GitHub 源码</text>
  <text x="619" y="245" font-size="9" fill="rgba(255,255,255,0.25)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">↗</text>

  <!-- Row 3: Check update -->
  <rect x="408" y="258" width="216" height="26" rx="5" fill="rgba(255,255,255,0.04)"/>
  <text x="413" y="275" font-size="12" fill="rgba(10,132,255,0.75)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">↓</text>
  <text x="430" y="275" font-size="10" fill="rgba(255,255,255,0.65)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">检查更新</text>
  <text x="619" y="275" font-size="9" fill="rgba(255,255,255,0.25)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">↗</text>

  <!-- MIT License -->
  <text x="516" y="304" font-size="8.5" fill="rgba(255,255,255,0.18)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">MIT License · © 2025 Victor</text>

  <!-- Callout annotation -->
  <text x="516" y="325" font-size="9" fill="rgba(255,255,255,0.22)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">点击副标题展开关于面板</text>
  <text x="516" y="338" font-size="9" fill="rgba(255,255,255,0.16)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">带动画滑入效果</text>

  <!-- Bottom label -->
  <text x="360" y="370" font-size="10" fill="rgba(255,255,255,0.14)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle" letter-spacing="2">OFFLINE CACHE  &amp;  ABOUT PANEL</text>

</svg>
