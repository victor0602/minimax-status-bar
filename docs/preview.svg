<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c16"/>
      <stop offset="100%" stop-color="#14101f"/>
    </linearGradient>

    <!-- Ambient glow left -->
    <radialGradient id="glow-left" cx="25%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#4f35e8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4f35e8" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient glow right -->
    <radialGradient id="glow-right" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </radialGradient>

    <!-- Panel drop shadow -->
    <filter id="panel-shadow" x="-25%" y="-10%" width="150%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <!-- Button glow -->
    <filter id="btn-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for progress bars -->
    <clipPath id="pb-clip-1"><rect width="262" height="4" rx="2"/></clipPath>
    <clipPath id="pb-clip-2"><rect width="262" height="4" rx="2"/></clipPath>
    <clipPath id="pb-clip-3"><rect width="262" height="4" rx="2"/></clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="720" height="520" fill="url(#bg)"/>
  <rect width="720" height="520" fill="url(#glow-left)"/>
  <rect width="720" height="520" fill="url(#glow-right)"/>

  <!-- Background decorative "windows" suggesting desktop -->
  <rect x="28" y="100" width="210" height="310" rx="10" fill="rgba(255,255,255,0.018)" stroke="rgba(255,255,255,0.045)" stroke-width="0.6"/>
  <rect x="52" y="124" width="160" height="14" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="52" y="146" width="130" height="8" rx="2" fill="rgba(255,255,255,0.025)"/>
  <rect x="52" y="162" width="148" height="8" rx="2" fill="rgba(255,255,255,0.025)"/>
  <rect x="52" y="178" width="120" height="8" rx="2" fill="rgba(255,255,255,0.025)"/>
  <rect x="52" y="202" width="162" height="60" rx="5" fill="rgba(255,255,255,0.03)"/>
  <rect x="52" y="272" width="162" height="60" rx="5" fill="rgba(255,255,255,0.03)"/>

  <rect x="648" y="110" width="52" height="280" rx="8" fill="rgba(255,255,255,0.018)" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
  <rect x="656" y="128" width="36" height="6" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="656" y="142" width="28" height="6" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="656" y="156" width="32" height="6" rx="2" fill="rgba(255,255,255,0.03)"/>

  <!-- ── MENU BAR ── -->
  <rect x="0" y="28" width="720" height="27" fill="#252525"/>
  <rect x="0" y="55" width="720" height="0.5" fill="rgba(0,0,0,0.5)"/>
  <rect x="0" y="28" width="720" height="0.5" fill="rgba(255,255,255,0.06)"/>

  <!-- Menu bar left: Apple + menus -->
  <circle cx="20" cy="42" r="6" fill="rgba(255,255,255,0.75)"/>
  <text x="38" y="47" font-size="11.5" font-weight="600" fill="rgba(255,255,255,0.72)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">Finder</text>
  <text x="88" y="47" font-size="11" fill="rgba(255,255,255,0.42)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">File</text>
  <text x="114" y="47" font-size="11" fill="rgba(255,255,255,0.42)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">Edit</text>
  <text x="140" y="47" font-size="11" fill="rgba(255,255,255,0.42)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">View</text>
  <text x="166" y="47" font-size="11" fill="rgba(255,255,255,0.42)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">Go</text>

  <!-- Menu bar right: system items -->
  <!-- Battery -->
  <rect x="556" y="35" width="20" height="10" rx="2" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.1"/>
  <rect x="576" y="38" width="2.5" height="4" rx="0.8" fill="rgba(255,255,255,0.45)"/>
  <rect x="557.5" y="36.5" width="16" height="7" rx="1.2" fill="#32d74b"/>
  <!-- Wifi bars simplified -->
  <rect x="587" y="43" width="3" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="592" y="40" width="3" height="8" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="597" y="37" width="3" height="11" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Time -->
  <text x="612" y="47" font-size="11" fill="rgba(255,255,255,0.58)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">15:30</text>

  <!-- ── STATUS BAR ITEM (highlighted) ── -->
  <rect x="456" y="30" width="94" height="23" rx="5.5" fill="rgba(255,255,255,0.16)"/>
  <!-- Green dot -->
  <circle cx="467" cy="41.5" r="4.5" fill="#32d74b"/>
  <circle cx="467" cy="41.5" r="4.5" fill="#32d74b" filter="url(#btn-glow)" opacity="0.6"/>
  <!-- Text -->
  <text x="476" y="47" font-size="11" font-weight="500" fill="white" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">2.7·72%</text>

  <!-- ── CARET ── -->
  <polygon points="497,55 486,68 508,68" fill="#1c1c1e"/>
  <polyline points="486,68 497,55 508,68" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.7"/>

  <!-- ── PANEL ── -->
  <!-- Shadow layer -->
  <rect x="312" y="76" width="318" height="428" rx="13" fill="rgba(0,0,0,0.7)" filter="url(#panel-shadow)"/>
  <!-- Main panel -->
  <rect x="313" y="68" width="316" height="428" rx="12" fill="#1c1c1e"/>
  <!-- Panel border -->
  <rect x="313" y="68" width="316" height="428" rx="12" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.7"/>
  <!-- Top inner highlight -->
  <rect x="313" y="68" width="316" height="1" rx="0" fill="rgba(255,255,255,0.12)"/>

  <!-- ── PANEL HEADER ── -->
  <text x="328" y="95" font-size="13.5" font-weight="700" fill="white" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">MiniMax</text>
  <text x="328" y="112" font-size="10" fill="rgba(255,255,255,0.45)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">Token Plan 用量</text>

  <!-- Refresh button -->
  <circle cx="608" cy="91" r="15" fill="rgba(255,255,255,0.07)"/>
  <circle cx="608" cy="91" r="15" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
  <!-- Refresh arrow -->
  <path d="M601,87 A8,8 0 1,1 603,96" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="601,83 598,88 605,88" fill="rgba(255,255,255,0.6)"/>

  <!-- Loading indicator (subtle dot) -->
  <circle cx="595" cy="112" r="2.5" fill="rgba(50,215,75,0.5)"/>

  <!-- ── LAST UPDATED ── -->
  <text x="328" y="130" font-size="9.5" fill="rgba(255,255,255,0.28)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">最后更新：刚刚</text>

  <!-- Separator -->
  <rect x="313" y="140" width="316" height="0.5" fill="rgba(255,255,255,0.07)"/>

  <!-- ── SECTION: TEXT ── -->
  <text x="328" y="160" font-size="9" font-weight="600" fill="rgba(255,255,255,0.3)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" letter-spacing="1.4">TEXT</text>

  <!-- ── CARD 1: MiniMax-M2.7 ── -->
  <rect x="321" y="167" width="300" height="108" rx="9" fill="#252528"/>
  <rect x="321" y="167" width="300" height="108" rx="9" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
  <!-- Left accent bar -->
  <rect x="321" y="179" width="3" height="30" rx="1.5" fill="#32d74b" opacity="0.8"/>

  <!-- Model name -->
  <text x="334" y="187" font-size="12" font-weight="600" fill="white" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">MiniMax-M2.7</text>
  <!-- Remaining % -->
  <text x="610" y="187" font-size="12" font-weight="600" fill="#32d74b" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">72%</text>
  <!-- Used % -->
  <text x="610" y="200" font-size="9" fill="rgba(255,255,255,0.35)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">已用 28%</text>

  <!-- Progress bar track -->
  <rect x="334" y="210" width="262" height="5" rx="2.5" fill="#3a3a3c"/>
  <!-- Progress bar fill 72% = 188.6px -->
  <rect x="334" y="210" width="189" height="5" rx="2.5" fill="url(#progress-green)"/>
  <defs>
    <linearGradient id="progress-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30c55a"/>
      <stop offset="100%" stop-color="#32d74b"/>
    </linearGradient>
    <linearGradient id="progress-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c400"/>
      <stop offset="100%" stop-color="#ffd60a"/>
    </linearGradient>
    <linearGradient id="progress-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e03030"/>
      <stop offset="100%" stop-color="#ff453a"/>
    </linearGradient>
  </defs>

  <!-- Stats row -->
  <text x="334" y="231" font-size="9.5" fill="rgba(255,255,255,0.45)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">剩余 72,000 / 100,000</text>
  <text x="610" y="231" font-size="9.5" fill="rgba(255,255,255,0.38)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">重置 2h 30m</text>

  <!-- Expanded weekly row -->
  <rect x="321" y="243" width="300" height="0.5" fill="rgba(255,255,255,0.05)"/>
  <text x="334" y="259" font-size="9" fill="rgba(255,255,255,0.22)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">本周剩余 480,000 / 700,000</text>
  <text x="610" y="259" font-size="9" fill="rgba(255,255,255,0.2)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">本周已用 220,000</text>

  <!-- ── SECTION: VIDEO ── -->
  <text x="328" y="294" font-size="9" font-weight="600" fill="rgba(255,255,255,0.3)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" letter-spacing="1.4">VIDEO</text>

  <!-- ── CARD 2: Hailuo-2.3 ── -->
  <rect x="321" y="301" width="300" height="82" rx="9" fill="#252528"/>
  <rect x="321" y="301" width="300" height="82" rx="9" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
  <!-- Left accent bar -->
  <rect x="321" y="312" width="3" height="28" rx="1.5" fill="#ffd60a" opacity="0.8"/>

  <text x="334" y="321" font-size="12" font-weight="600" fill="white" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">Hailuo-2.3</text>
  <text x="610" y="321" font-size="12" font-weight="600" fill="#ffd60a" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">45%</text>
  <text x="610" y="334" font-size="9" fill="rgba(255,255,255,0.35)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">已用 55%</text>

  <!-- Progress bar track -->
  <rect x="334" y="343" width="262" height="5" rx="2.5" fill="#3a3a3c"/>
  <!-- 45% = 117.9px -->
  <rect x="334" y="343" width="118" height="5" rx="2.5" fill="url(#progress-yellow)"/>

  <!-- Stats -->
  <text x="334" y="364" font-size="9.5" fill="rgba(255,255,255,0.45)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">剩余 4,500 / 10,000</text>
  <text x="610" y="364" font-size="9.5" fill="rgba(255,255,255,0.38)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">重置 8h 15m</text>

  <!-- More sections hint -->
  <text x="471" y="406" font-size="11" fill="rgba(255,255,255,0.15)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">• • •</text>

  <!-- Separator before bottom bar -->
  <rect x="313" y="418" width="316" height="0.5" fill="rgba(255,255,255,0.07)"/>

  <!-- ── BOTTOM BAR ── -->
  <!-- Exit button -->
  <rect x="325" y="426" width="44" height="22" rx="5.5" fill="rgba(255,255,255,0.07)"/>
  <rect x="325" y="426" width="44" height="22" rx="5.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text x="347" y="441" font-size="10.5" fill="rgba(255,255,255,0.55)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">退出</text>

  <!-- Update button -->
  <rect x="375" y="426" width="94" height="22" rx="5.5" fill="rgba(10,132,255,0.22)"/>
  <rect x="375" y="426" width="94" height="22" rx="5.5" fill="none" stroke="rgba(10,132,255,0.35)" stroke-width="0.5"/>
  <text x="422" y="441" font-size="10" fill="#4da6ff" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">↓ 更新 v2.0</text>

  <!-- Launch at login (power icon, enabled = green) -->
  <rect x="475" y="426" width="28" height="22" rx="5.5" fill="rgba(255,255,255,0.07)"/>
  <rect x="475" y="426" width="28" height="22" rx="5.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <circle cx="489" cy="437" r="5.5" fill="none" stroke="#32d74b" stroke-width="1.5"/>
  <line x1="489" y1="431" x2="489" y2="435" stroke="#32d74b" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Console button -->
  <rect x="509" y="426" width="60" height="22" rx="5.5" fill="rgba(255,255,255,0.07)"/>
  <rect x="509" y="426" width="60" height="22" rx="5.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text x="539" y="441" font-size="10" fill="rgba(255,255,255,0.55)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle">控制台 ↗</text>

  <!-- ── VERSION BAR ── -->
  <text x="328" y="466" font-size="9" fill="rgba(255,255,255,0.22)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif">v2.0</text>
  <!-- GitHub link -->
  <text x="601" y="466" font-size="9" fill="rgba(255,255,255,0.22)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">{ } GitHub</text>

  <!-- ── FEATURE CALLOUTS (floating labels) ── -->
  <!-- Callout: 菜单栏一眼感知 -->
  <line x1="420" y1="42" x2="310" y2="42" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="308" cy="42" r="2" fill="rgba(255,255,255,0.3)"/>
  <text x="296" y="38" font-size="9" fill="rgba(255,255,255,0.4)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="end">一眼感知</text>

  <!-- Callout: 颜色指示 -->
  <line x1="467" y1="50" x2="467" y2="62" stroke="rgba(50,215,75,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- ── BOTTOM LABEL ── -->
  <text x="360" y="500" font-size="11" fill="rgba(255,255,255,0.18)" font-family="'-apple-system','Helvetica Neue',Arial,sans-serif" text-anchor="middle" letter-spacing="2.5">MINIMAX STATUS BAR  ·  v2.0</text>

</svg>
