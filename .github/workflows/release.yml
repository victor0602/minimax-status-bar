name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and package DMG
        run: |
          mkdir -p build/dmg-staging

          # Archive
          xcodebuild archive \
            -project minimax-status-bar.xcodeproj \
            -scheme minimax-status-bar \
            -configuration Release \
            -archivePath build/minimax-status-bar.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # Export .app
          xcodebuild -exportArchive \
            -archivePath build/minimax-status-bar.xcarchive \
            -exportPath build \
            -exportOptionsPlist scripts/ExportOptions.plist

          # Package .dmg
          cp -R build/"MiniMax Status Bar.app" build/dmg-staging/

          # Ad-hoc codesign to resolve Gatekeeper "file damaged" warning
          codesign --force --deep --sign - \
            --options runtime \
            "build/dmg-staging/MiniMax Status Bar.app"

          ln -sf /Applications build/dmg-staging/Applications
          hdiutil create \
            -volname "MiniMax Status Bar" \
            -srcfolder build/dmg-staging \
            -format UDZO \
            -ov build/MiniMaxStatusBar.dmg

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/MiniMaxStatusBar.dmg
          generate_release_notes: true
          body: |
            ## Installation

            1. Download the `.dmg` file above
            2. Open the DMG and drag **MiniMax Status Bar** into **Applications**
            3. On first launch, if you see a security warning, go to **System Settings → Privacy & Security → Still Open**

            ## Requirements

            - macOS 13.0+
            - MiniMax **Token Plan** key (see repo README for OpenClaw / env setup)
