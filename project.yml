name: minimax-status-bar
packages:
  SQLiteSwift:
    url: https://github.com/stephencelis/SQLite.swift
    from: 0.15.3
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

schemes:
  minimax-status-bar:
    build:
      targets:
        minimax-status-bar: all
        minimax-status-barTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - minimax-status-barTests

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_NAME: "MiniMax Status Bar"

targets:
  minimax-status-bar:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: SQLiteSwift
        product: SQLite
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.minimax-status-bar
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_TESTABILITY: YES
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleName: "MiniMax Status Bar"
        CFBundleDisplayName: "MiniMax Status Bar"
        CFBundleIdentifier: com.openclaw.minimax-status-bar
        CFBundleVersion: "3"
        CFBundleShortVersionString: "1.3.1"
        CFBundlePackageType: APPL
        CFBundleExecutable: "MiniMax Status Bar"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHighResolutionCapable: true

  minimax-status-barTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: minimax-status-bar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.minimax-status-barTests
        PRODUCT_NAME: minimax-status-barTests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGNING_ALLOWED: "NO"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MiniMax Status Bar.app/Contents/MacOS/MiniMax Status Bar"
        BUNDLE_LOADER: "$(TEST_HOST)"
